<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <!-- Background -->
  <rect width="900" height="220" fill="#fffbeb"/>
  <!-- Top accent bar -->
  <rect width="900" height="6" fill="#f59e0b"/>
  <!-- Bottom accent bar -->
  <rect y="214" width="900" height="6" fill="#f59e0b"/>

  <!-- Logo box -->
  <rect x="40" y="52" width="80" height="80" rx="12" fill="#f59e0b"/>
  <text x="80" y="92" fill="white" font-family="Helvetica,Arial,sans-serif" font-size="40" font-weight="bold" text-anchor="middle" dominant-baseline="middle">PM</text>

  <!-- Project name -->
  <text x="142" y="90" fill="#451a03" font-family="Helvetica,Arial,sans-serif" font-size="46" font-weight="bold">PaperMind</text>

  <!-- Tagline -->
  <text x="144" y="122" fill="#b45309" font-family="Helvetica,Arial,sans-serif" font-size="16">PDF  →  MinerU OCR  →  clean Markdown + LaTeX</text>

  <!-- Badge 1: PyQt5 Desktop -->
  <rect x="144" y="152" width="110" height="26" rx="5" fill="#f59e0b"/>
  <text x="199" y="165" fill="white" font-family="Helvetica,Arial,sans-serif" font-size="11" text-anchor="middle" dominant-baseline="middle">PyQt5 Desktop</text>

  <!-- Badge 2: MinerU SDK -->
  <rect x="264" y="152" width="106" height="26" rx="5" fill="#b45309"/>
  <text x="317" y="165" fill="white" font-family="Helvetica,Arial,sans-serif" font-size="11" text-anchor="middle" dominant-baseline="middle">MinerU SDK</text>

  <!-- Badge 3: LaTeX Output -->
  <rect x="380" y="152" width="110" height="26" rx="5" fill="#0891b2"/>
  <text x="435" y="165" fill="white" font-family="Helvetica,Arial,sans-serif" font-size="11" text-anchor="middle" dominant-baseline="middle">LaTeX Output</text>

  <!-- Badge 4: Batch Processing -->
  <rect x="500" y="152" width="116" height="26" rx="5" fill="#16a34a"/>
  <text x="558" y="165" fill="white" font-family="Helvetica,Arial,sans-serif" font-size="11" text-anchor="middle" dominant-baseline="middle">Batch Processing</text>

  <!-- Card 1: Formula-Aware OCR -->
  <rect x="678" y="24" width="200" height="78" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <rect x="678" y="24" width="5" height="78" rx="2" fill="#f59e0b"/>
  <text x="694" y="48" fill="#451a03" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="bold">Formula-Aware OCR</text>
  <text x="694" y="68" fill="#6b7280" font-family="Helvetica,Arial,sans-serif" font-size="10">Math → LaTeX,</text>
  <text x="694" y="84" fill="#6b7280" font-family="Helvetica,Arial,sans-serif" font-size="10">table → Markdown</text>

  <!-- Card 2: EduForge Upstream -->
  <rect x="678" y="118" width="200" height="78" rx="8" fill="white" stroke="#b45309" stroke-width="2"/>
  <rect x="678" y="118" width="5" height="78" rx="2" fill="#b45309"/>
  <text x="694" y="142" fill="#451a03" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="bold">EduForge Upstream</text>
  <text x="694" y="162" fill="#6b7280" font-family="Helvetica,Arial,sans-serif" font-size="10">feeds into the</text>
  <text x="694" y="178" fill="#6b7280" font-family="Helvetica,Arial,sans-serif" font-size="10">content pipeline</text>
</svg>
